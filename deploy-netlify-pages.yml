name: Bulk Deploy Netlify Redirect Sites

on:
  workflow_dispatch:
    inputs:
      number_of_pages:
        description: "How many pages/sites to create"
        required: true
        default: "1"
        type: string
      name_source:
        description: "Where site names come from"
        required: true
        default: "from_sheet"
        type: choice
        options:
          - from_sheet
          - manual
      manual_names:
        description: "Comma-separated names (only used if name_source = manual)"
        required: false
        default: ""
        type: string
      base_site_name:
        description: "Fallback prefix if there aren't enough names in the sheet"
        required: false
        default: "site"
        type: string
      default_url:
        description: "Fallback redirect URL (used when ?ref= is missing/unknown)"
        required: true
        default: "https://example.com"
        type: string
      partner1_url:
        description: "Redirect URL for ?ref=partner1"
        required: false
        default: "https://example.com/?src=partner1"
        type: string
      partner2_url:
        description: "Redirect URL for ?ref=partner2"
        required: false
        default: "https://example.com/?src=partner2"
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.names.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        working-directory: scripts
        run: npm install
      - name: Pick site names from sheet / manual input
        id: names
        working-directory: scripts
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          NUM_PAGES: ${{ inputs.number_of_pages }}
          NAME_SOURCE: ${{ inputs.name_source }}
          MANUAL_NAMES: ${{ inputs.manual_names }}
          BASE_SITE_NAME: ${{ inputs.base_site_name }}
        run: node get-names.js

  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        site_name: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Netlify CLI + sheet deps
        run: |
          npm install -g netlify-cli
          npm install --prefix scripts

      - name: Generate edge function from inputs
        run: |
          mkdir -p edge-functions
          cat > edge-functions/redirect.js <<EOF
          export default async (request, context) => {
            const url = new URL(request.url);
            const ref = url.searchParams.get("ref") || "default";
            const destinations = {
              partner1: "${{ inputs.partner1_url }}",
              partner2: "${{ inputs.partner2_url }}",
              default: "${{ inputs.default_url }}"
            };
            const target = destinations[ref] || destinations.default;
            return Response.redirect(target, 302);
          };
          EOF

      - name: Ensure netlify.toml exists
        run: |
          cat > netlify.toml <<EOF
          [build]
            publish = "public"
            edge_functions = "edge-functions"
          [[edge_functions]]
            path = "/go"
            function = "redirect"
          EOF

      - name: Ensure public/ has an index page
        run: |
          mkdir -p public
          echo "<h1>${{ matrix.site_name }}</h1><p>Try /go?ref=partner1</p>" > public/index.html

      - name: Create site (idempotent) and capture Site ID
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          set -e
          EXISTING_ID=$(netlify api getSite --data "{\"site_id\":\"${{ matrix.site_name }}\"}" 2>/dev/null | jq -r '.id // empty' || true)
          if [ -z "$EXISTING_ID" ]; then
            echo "Creating new site: ${{ matrix.site_name }}"
            CREATE_OUT=$(netlify sites:create --name "${{ matrix.site_name }}" --json)
            SITE_ID=$(echo "$CREATE_OUT" | jq -r '.id')
          else
            echo "Site already exists: $EXISTING_ID"
            SITE_ID=$EXISTING_ID
          fi
          echo "SITE_ID=$SITE_ID" >> "$GITHUB_ENV"

      - name: Deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          netlify deploy \
            --site "$SITE_ID" \
            --dir public \
            --prod \
            --message "Deploy via GitHub Actions ($GITHUB_SHA)"

      - name: Record URL in Google Sheet
        working-directory: scripts
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          SITE_NAME: ${{ matrix.site_name }}
          SITE_URL: https://${{ matrix.site_name }}.netlify.app
        run: node append-url.js

      - name: Print live URL
        run: |
          echo "Deployed: https://${{ matrix.site_name }}.netlify.app/go?ref=partner1"
